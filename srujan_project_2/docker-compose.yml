services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: emaildigest
      POSTGRES_USER: emaildigest
      POSTGRES_PASSWORD: emaildigest_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emaildigest -d emaildigest"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./sentineliq-email-digest-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/emaildigest
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: emaildigest
      SPRING_DATASOURCE_PASSWORD: emaildigest_pass
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      APP_SEED_EMAIL_LOGS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pg_data:

